<html lang="en">

<style>
:root {
  --pink-base: #ED017F;
  --pink-light: #F18DC1;
  --pink-lighter: #F3CBE0;
  --pink-bg: #FDF5F5;

  --yellow-base: #FFC854;
  --yellow-light: #FAD078;
  --yellow-lighter: #FCE7C8;
  --yellow-bg: #FFFAEE;

  --blue-base: #39C2D7;
  --blue-light: #72CDDF;
  --blue-lighter: #C7E9F0;
  --blue-bg: #F2F9FC;

  --purple-base: #27004B;
  --purple-mid: #514F9C;
  --purple-light: #9A98CB;
  --purple-bg: #F7F4FA;

  --grey-base: #3D3C3C;
  --grey-mid: #999999;
  --grey-light: #EAEAEA;
  --white: #FFFFFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Roboto', system-ui, sans-serif;
  font-weight: 400;
  color: var(--grey-base);
  background: var(--white);
  line-height: 1.5;
  min-height: 100vh;
  position: relative;
}

.skip-link {
  position: absolute;
  left: -9999px;
  top: 0;
  background: var(--purple-base);
  color: var(--white);
  padding: 0.5rem 1rem;
  z-index: 100;
  text-decoration: none;
  font-weight: 500;
}
.skip-link:focus { left: 0.5rem; top: 0.5rem; }

/* Banner */
.banner {
  background: var(--purple-base);
  color: var(--white);
  padding: 3rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.banner h1 {
  font-weight: 900;
  font-size: clamp(1.75rem, 4vw, 2.75rem);
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}
.banner p {
  margin-top: 0.75rem;
  font-size: clamp(1rem, 2vw, 1.15rem);
  font-weight: 400;
  opacity: 0.92;
  max-width: 50rem;
  margin-left: auto;
  margin-right: auto;
  position: relative;
  z-index: 1;
}
.banner-sparkle {
  position: absolute;
  opacity: 0.65;
  z-index: 0;
}
.banner-sparkle.s1 { top: 1rem; left: 5%; }
.banner-sparkle.s2 { bottom: 0.8rem; right: 6%; }
.banner-sparkle.s3 { top: 55%; right: 14%; }
.banner-sparkle.s4 { bottom: 1rem; left: 12%; }
.banner-sparkle.s5 { top: 30%; left: 18%; }

/* Layout */
.main {
  display: grid;
  grid-template-columns: minmax(240px, 28%) 1fr;
  gap: 2.5rem;
  padding: 2.5rem 2rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* Thermometer column */
.thermometer-col {
  position: sticky;
  top: 1.5rem;
  align-self: start;
  border-right: 1px solid var(--grey-light);
  padding-right: 2rem;
  text-align: center;
}
.section-heading {
  font-weight: 700;
  font-size: 1.4rem;
  margin-bottom: 1.25rem;
  color: var(--purple-base);
  text-align: center;
}

.thermo-total-wrap {
  display: block;
  padding: 0.25rem 0;
}
.thermo-num {
  font-weight: 900;
  font-size: 2.75rem;
  color: var(--purple-base);
  line-height: 1;
  display: block;
}
.thermo-unit {
  font-size: 0.9rem;
  color: var(--grey-mid);
  display: block;
  margin-top: 0.25rem;
}

.thermo-celebration {
  display: inline-block;
  margin-top: 0.9rem;
  padding: 0.5rem 0.95rem;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
  background: linear-gradient(135deg, var(--pink-base), var(--yellow-base));
  border-radius: 999px;
  box-shadow: 0 3px 10px rgba(237, 1, 127, 0.25);
  animation: celebration-pulse 2.4s ease-in-out infinite;
}
.thermo-celebration[hidden] { display: none; }
@keyframes celebration-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 3px 10px rgba(237, 1, 127, 0.25); }
  50% { transform: scale(1.04); box-shadow: 0 5px 16px rgba(237, 1, 127, 0.4); }
}
@media (prefers-reduced-motion: reduce) {
  .thermo-celebration { animation: none; }
}

.thermo-bar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  margin-top: 1.25rem;
}
.thermo-label-top, .thermo-label-bottom {
  font-size: 0.85rem;
  color: var(--grey-mid);
  font-weight: 500;
}
.thermo-label-top { order: 1; }
.thermo-bar { order: 2; }
.thermo-label-bottom { order: 3; }

.thermo-bar {
  position: relative;
  width: 60px;
  height: 340px;
  background: var(--grey-light);
  border-radius: 30px;
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
}
.thermo-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, var(--pink-base), var(--yellow-base));
  border-radius: 30px;
  height: 0;
  transition: height 1.5s cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* Cards column */
.cards-col {
  min-width: 0;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1.5rem;
}

/* Flip cards */
.card {
  perspective: 1200px;
  min-height: 290px;
  cursor: pointer;
  position: relative;
  border-radius: 14px;
}
.card:focus { outline: none; }
.card:focus-visible .card-inner {
  box-shadow: 0 0 0 3px var(--purple-mid), 0 4px 18px rgba(39, 0, 75, 0.1);
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 290px;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
  border-radius: 14px;
}
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  padding: 2.5rem 1.5rem 1.25rem;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 18px rgba(39, 0, 75, 0.1);
  overflow: hidden;
}

.card-back {
  transform: rotateY(180deg);
  background: var(--white);
  color: var(--grey-base);
}

/* Color rotation */
.card[data-color="pink"] .card-front { background: var(--pink-base); color: var(--white); }
.card[data-color="blue"] .card-front { background: var(--blue-base); color: var(--white); }
.card[data-color="yellow"] .card-front { background: var(--yellow-base); color: var(--grey-base); }
.card[data-color="purple"] .card-front { background: var(--purple-mid); color: var(--white); }

.card[data-color="pink"] .card-back { background: var(--pink-bg); }
.card[data-color="blue"] .card-back { background: var(--blue-bg); }
.card[data-color="yellow"] .card-back { background: var(--yellow-bg); }
.card[data-color="purple"] .card-back { background: var(--purple-bg); }

.card-flip-hint {
  position: absolute;
  top: 0.85rem;
  right: 1rem;
  font-size: 0.78rem;
  font-weight: 500;
  opacity: 0.85;
}
.card-release-date {
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  opacity: 0.85;
  margin-bottom: 0.4rem;
  display: block;
}
.card-title {
  font-weight: 700;
  font-size: 1.3rem;
  flex: 1;
  line-height: 1.25;
  padding-right: 1rem;
  margin-top: 0;
}
.card-stats {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}
.stat-chip {
  background: rgba(255, 255, 255, 0.22);
  padding: 0.4rem 0.7rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  line-height: 1;
}
.card[data-color="yellow"] .stat-chip {
  background: rgba(61, 60, 60, 0.12);
}

.card-back-flip {
  position: absolute;
  top: 0.85rem;
  right: 1rem;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--purple-mid);
}
.card-back-body {
  font-size: 0.95rem;
  line-height: 1.55;
  overflow-y: auto;
  flex: 1;
  padding-right: 0.25rem;
  margin-top: 0.5rem;
}
.card-back-thanks {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--purple-base);
  padding-top: 0.9rem;
  margin-top: 0.9rem;
  border-top: 1px solid rgba(39, 0, 75, 0.12);
}

/* Confetti background */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  inset: 0;
  overflow: hidden;
}
.confetti svg {
  position: absolute;
  top: 0;
  opacity: 0.18;
  will-change: transform;
}

@keyframes confetti-drift {
  0%   { transform: translate3d(0, -12vh, 0) rotate(0deg); }
  25%  { transform: translate3d(var(--sway, 20px), 22vh, 0) rotate(120deg); }
  50%  { transform: translate3d(0, 52vh, 0) rotate(240deg); }
  75%  { transform: translate3d(calc(var(--sway, 20px) * -1), 82vh, 0) rotate(360deg); }
  100% { transform: translate3d(0, 112vh, 0) rotate(480deg); }
}

@keyframes burst-piece {
  0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  30%  { transform: translate(calc(var(--dx, 0px) * 0.55), calc(var(--dy, 0px) * 0.45 - 60px)) rotate(calc(var(--rot, 360deg) * 0.4)); opacity: 1; }
  100% { transform: translate(var(--dx, 0px), calc(var(--dy, 0px) + 240px)) rotate(var(--rot, 360deg)); opacity: 0; }
}

.burst-piece {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  will-change: transform, opacity;
}

@media (prefers-reduced-motion: reduce) {
  .confetti svg { animation: none !important; }
  .burst-piece { display: none !important; }
}

/* Main and banner above confetti */
.banner, .main, .footer { position: relative; z-index: 1; }

/* Empty / error */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--grey-mid);
  font-size: 1.05rem;
  grid-column: 1 / -1;
  background: var(--purple-bg);
  border-radius: 14px;
}
.error-banner {
  background: var(--yellow-bg);
  border-left: 4px solid var(--yellow-base);
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  border-radius: 6px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 0.85rem;
  color: var(--grey-mid);
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .card-inner, .thermo-fill { transition: none; }
}

/* Responsive */
@media (max-width: 1000px) {
  .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 720px) {
  .main {
    grid-template-columns: 1fr;
    padding: 1.5rem 1rem;
    gap: 1.75rem;
  }
  .thermometer-col {
    position: static;
    border-right: none;
    border-bottom: 1px solid var(--grey-light);
    padding-right: 0;
    padding-bottom: 1.5rem;
  }
  .thermo-bar {
    width: 100%;
    height: 36px;
    border-radius: 18px;
  }
  .thermo-fill {
    height: 100%;
    width: 0;
    top: 0;
    bottom: auto;
    background: linear-gradient(to right, var(--pink-base), var(--yellow-base));
    transition: width 1.5s cubic-bezier(0.22, 0.61, 0.36, 1);
    border-radius: 18px;
  }
  .thermo-bar-section { flex-direction: row; align-items: center; }
  .thermo-label-top { order: 3; }
  .thermo-label-bottom { order: 1; }
  .cards-grid { grid-template-columns: 1fr; }
  .banner { padding: 2rem 1rem; }
}
</style>
</head>

<header class="banner" role="banner">

<script>
// ============================================================
// CONFIGURATION: Update these URLs after publishing your Google Sheet.
// File > Share > Publish to web > select tab > CSV > Publish > copy URL.
// While these are placeholders, the page renders SAMPLE_DATA below.

const DONE_ITEMS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6xkDQkkTuH1Snu1eruYbKW5j83vkPuh0tKnX5zaQzHu3D0CIyCbHmb93JCQVtnUb-YfmWDt7psUh7/pub?gid=1782361722&single=true&output=csv';
const CONFIG_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6xkDQkkTuH1Snu1eruYbKW5j83vkPuh0tKnX5zaQzHu3D0CIyCbHmb93JCQVtnUb-YfmWDt7psUh7/pub?gid=1921179001&single=true&output=csv';
// ============================================================

const SAMPLE_DATA = {

    },
    {

      "Staff Summary": "School Champions can now upload an entire student roster from a spreadsheet instead of adding students one by one. A process that took hours now takes minutes.",
      "H/W/P": 2.0,
      "# Impacted": 150,

};

const CARD_COLORS = ['pink', 'blue', 'yellow', 'purple'];

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

function csvToObjects(text) {
  const rows = parseCSV(text).filter(r => r.some(c => c && c.trim()));
  if (rows.length === 0) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
    return obj;
  });
}

function csvToKeyValue(text) {
  const rows = parseCSV(text).filter(r => r[0] && r[0].trim());
  const obj = {};
  rows.slice(1).forEach(r => {
    if (r[0] && r[0].trim()) obj[r[0].trim()] = (r[1] || '').trim();
  });
  return obj;
}

function isPlaceholderURL(url) {
  return !url || url.startsWith('YOUR_PUBLISHED');
}

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  return res.text();
}

function toNum(v) {
  if (typeof v === 'number') return v;
  if (v === null || v === undefined) return 0;
  const n = parseFloat(String(v).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}

function formatNum(n) {
  return Math.round(n).toLocaleString('en-US');
}

function formatDecimal(n) {
  if (Number.isInteger(n)) return n.toString();
  return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function formatReleaseDate(s) {
  if (!s) return '';
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return String(s);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthIdx = parseInt(m[2], 10) - 1;
  if (monthIdx < 0 || monthIdx > 11) return String(s);
  return months[monthIdx] + ' ' + parseInt(m[3], 10) + ', ' + m[1];
}

function animateCounter(el, target, duration = 1800) {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = formatNum(target);
    return;
  }
  const start = performance.now();
  function frame(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = formatNum(target * eased);
    if (t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function emojiFor(pct) {
  if (pct >= 100) return '🏆';
  if (pct >= 75) return '🎉';
  if (pct >= 50) return '🔥';
  return '';
}

function renderBanner(config) {
  if (config['Banner Title']) document.getElementById('banner-title').textContent = config['Banner Title'];
  if (config['Banner Subtitle']) document.getElementById('banner-subtitle').textContent = config['Banner Subtitle'];
  if (config['Banner Title']) document.title = config['Banner Title'];
  if (config['Sheet Last Updated']) {
    document.getElementById('last-updated').textContent = 'Sheet last updated: ' + config['Sheet Last Updated'];
  }
}

function renderThermometer(items, goal) {
  const total = items.reduce((s, it) => s + toNum(it['H/W Saved']), 0);
  const rawPct = goal > 0 ? (total / goal) * 100 : 0;
  const pct = Math.min(100, rawPct);
  document.getElementById('thermo-goal').textContent = formatNum(goal);
  document.getElementById('thermo-top-label').textContent = formatNum(goal);
  const celebration = document.getElementById('thermo-celebration');
  if (total >= goal && goal > 0) {
    const bonus = total - goal;
    celebration.textContent = bonus > 0
      ? '🏆 Goal exceeded! +' + formatNum(bonus) + ' hrs/week bonus'
      : '🏆 Goal reached!';
    celebration.hidden = false;
    setTimeout(() => fireConfettiBurst(celebration, 80), 900);
  } else {
    celebration.hidden = true;
  }
  const bar = document.getElementById('thermo-bar');
  bar.setAttribute('aria-valuenow', Math.round(pct));

  const fill = document.getElementById('thermo-fill');
  fill.dataset.pct = String(pct);
  const applyFill = () => {
    const isMobile = window.matchMedia('(max-width: 720px)').matches;
    if (isMobile) {
      fill.style.width = pct + '%';
      fill.style.height = '';
    } else {
      fill.style.height = pct + '%';
      fill.style.width = '';
    }
  };
  setTimeout(applyFill, 120);
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(applyFill, 100);
  });

  animateCounter(document.getElementById('thermo-num'), total);
}

function escapeHTML(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderCards(items) {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Big things are coming. We are working on BTS improvements that will save the team thousands of hours. Check back soon. 🚀';
    grid.appendChild(empty);
    return;
  }
  items.forEach((item, idx) => {
    const color = CARD_COLORS[idx % CARD_COLORS.length];
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-color', color);
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'listitem');
    card.setAttribute('aria-pressed', 'false');
    const summary = item['Summary'] || '';
    card.setAttribute('aria-label', summary + '. Press Enter to see details.');
    const hwp = toNum(item['H/W/P']);
    const impacted = toNum(item['# Impacted']);
    const saved = toNum(item['H/W Saved']);
    const releaseDate = formatReleaseDate(item['Date Completed']);
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-flip-hint" aria-hidden="true">tap to see details →</span>
          ${releaseDate ? `<span class="card-release-date">Released ${escapeHTML(releaseDate)}</span>` : ''}
          <div class="card-title">${escapeHTML(summary)}</div>
          <div class="card-stats" aria-hidden="true">
            <span class="stat-chip">⏱️ ${formatDecimal(hwp)} hrs/person</span>
            <span class="stat-chip">👥 ${formatNum(impacted)} people</span>
            <span class="stat-chip">💪 ${formatDecimal(saved)} hrs/week</span>
          </div>
        </div>
        <div class="card-face card-back">
          <span class="card-back-flip" aria-hidden="true">← flip back</span>
          <div class="card-back-body">${escapeHTML(item['Staff Summary'] || '')}</div>
          <div class="card-back-thanks">
            Requested by ${escapeHTML(item['Requested By'] || 'the team')}. Completed by ${escapeHTML(item['Team'] || 'the team')}. Thank you! 🙏
          </div>
        </div>
      </div>
    `;
    const toggle = () => {
      const flipped = !card.classList.contains('flipped');
      card.classList.toggle('flipped', flipped);
      card.setAttribute('aria-pressed', String(flipped));
    };
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggle();
      }
    });
    grid.appendChild(card);
  });
}

function showErrorBanner(msg) {
  const el = document.getElementById('error-banner-slot');
  el.innerHTML = `<div class="error-banner" role="alert">${escapeHTML(msg)}</div>`;
}

function sortItems(items) {
  return [...items].sort((a, b) => {
    const da = a['Date Completed'] || '';
    const db = b['Date Completed'] || '';
    return db.localeCompare(da);
  });
}

function prefersReducedMotion() {
  return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
}

function makeConfettiShape(color) {
  const r = Math.random();
  if (r > 0.66) return `<circle cx="12" cy="12" r="9" fill="${color}"/>`;
  if (r > 0.33) return `<path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6z" fill="${color}"/>`;
  return `<circle cx="12" cy="12" r="9" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="3 3"/>`;
}

function renderConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#ED017F', '#FFC854', '#39C2D7', '#9A98CB'];
  const reduced = prefersReducedMotion();
  const count = 26;
  for (let i = 0; i < count; i++) {
    const c = colors[i % colors.length];
    const size = 10 + Math.random() * 18;
    const left = Math.random() * 100;
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.style.left = left + '%';
    svg.innerHTML = makeConfettiShape(c);
    if (!reduced) {
      const duration = 10 + Math.random() * 12;
      const delay = -Math.random() * duration;
      const sway = (Math.random() * 40 - 20).toFixed(1) + 'px';
      svg.style.setProperty('--sway', sway);
      svg.style.animation = `confetti-drift ${duration.toFixed(2)}s linear infinite`;
      svg.style.animationDelay = `${delay.toFixed(2)}s`;
    } else {
      svg.style.top = (8 + Math.random() * 88) + '%';
    }
    container.appendChild(svg);
  }
}

function fireConfettiBurst(originElement, count = 70) {
  if (prefersReducedMotion()) return;
  if (!originElement) return;
  const rect = originElement.getBoundingClientRect();
  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height / 2;
  const colors = ['#ED017F', '#FFC854', '#39C2D7', '#9A98CB', '#514F9C'];
  const svgNS = 'http://www.w3.org/2000/svg';
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const velocity = 180 + Math.random() * 320;
    const dx = Math.cos(angle) * velocity;
    const dy = Math.sin(angle) * velocity;
    const rot = (Math.random() * 720 - 360);
    const size = 8 + Math.random() * 12;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const duration = 1.6 + Math.random() * 0.8;
    const piece = document.createElementNS(svgNS, 'svg');
    piece.setAttribute('class', 'burst-piece');
    piece.setAttribute('width', size);
    piece.setAttribute('height', size);
    piece.setAttribute('viewBox', '0 0 24 24');
    piece.style.left = (originX - size / 2) + 'px';
    piece.style.top = (originY - size / 2) + 'px';
    piece.style.setProperty('--dx', dx.toFixed(1) + 'px');
    piece.style.setProperty('--dy', dy.toFixed(1) + 'px');
    piece.style.setProperty('--rot', rot.toFixed(0) + 'deg');
    piece.style.animation = `burst-piece ${duration.toFixed(2)}s cubic-bezier(0.2, 0.7, 0.4, 1) forwards`;
    piece.innerHTML = makeConfettiShape(color);
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), Math.ceil(duration * 1000) + 100);
  }
}

async function init() {
  renderConfetti();
  let items = [];
  let config = {};
  const usingPlaceholder = isPlaceholderURL(DONE_ITEMS_CSV_URL) || isPlaceholderURL(CONFIG_CSV_URL);
  if (usingPlaceholder) {
    items = SAMPLE_DATA.items;
    config = SAMPLE_DATA.config;
  } else {
    try {
      const [itemsCSV, configCSV] = await Promise.all([
        fetchCSV(DONE_ITEMS_CSV_URL),
        fetchCSV(CONFIG_CSV_URL)
      ]);
      items = csvToObjects(itemsCSV);
      config = csvToKeyValue(configCSV);
    } catch (e) {
      showErrorBanner("Could not load data. Check that the Google Sheet is published and the URLs are correct. Showing sample data.");
      items = SAMPLE_DATA.items;
      config = SAMPLE_DATA.config;
    }
  }
  renderBanner(config);
  const goal = toNum(config['Goal']) || 2000;
  renderThermometer(items, goal);
  renderCards(sortItems(items));
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
